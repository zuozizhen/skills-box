name: Release By Commit

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write
  actions: write

concurrency:
  group: release-by-commit-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-release:
    if: startsWith(github.event.head_commit.message, 'release:')
    runs-on: ubuntu-latest
    steps:
      - name: Parse version from commit message
        id: parse
        env:
          HEAD_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          first_line="$(printf '%s\n' "$HEAD_MESSAGE" | head -n 1 | tr -d '\r')"
          version="$(printf '%s\n' "$first_line" | sed -nE 's/^release:[[:space:]]*v?([0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?)$/\1/p')"
          if [ -z "$version" ]; then
            echo "提交信息格式错误，请使用: release: 1.2.0"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version, commit and create tag
        run: npm run release -- "${{ steps.parse.outputs.version }}"

      - name: Trigger macOS release workflow
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.parse.outputs.tag }}
          BRANCH: ${{ github.ref_name }}
        run: gh workflow run release-macos.yml --ref "$BRANCH" -f tag="$RELEASE_TAG"
