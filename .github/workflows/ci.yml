name: CI

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "public/skills-box-show.png"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "public/skills-box-show.png"

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install Linux deps for Tauri checks
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Rust fmt check
        working-directory: src-tauri
        run: cargo fmt -- --check

      - name: Rust compile check
        working-directory: src-tauri
        run: cargo check

      - name: Secret scan (basic)
        run: |
          if rg -n "sk-[A-Za-z0-9]{20,}|BEGIN (RSA|OPENSSH|PRIVATE)|Bearer\\s+sk-" -S . \
            --glob '!node_modules/**' \
            --glob '!dist/**' \
            --glob '!src-tauri/target/**' \
            --glob '!.git/**'; then
            echo "Potential secret detected."
            exit 1
          fi
