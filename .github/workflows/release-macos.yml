name: Release macOS

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, e.g. v1.2.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: true

jobs:
  create-draft-release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Read tag
        id: meta
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          if gh release view "$TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            echo "Draft or release for $TAG already exists, skip create."
          else
            prerelease_flag=""
            if [[ "$TAG" == *-* ]]; then
              prerelease_flag="--prerelease"
            fi
            gh release create "$TAG" \
              --repo "$GH_REPO" \
              --draft \
              $prerelease_flag \
              --title "skills-box $TAG" \
              --notes "Automated release for $TAG"
          fi

  build-macos:
    name: Build macOS (${{ matrix.label }})
    needs: create-draft-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            label: Apple-Silicon
            arch: aarch64
          - runner: macos-15-intel
            label: Intel
            arch: x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Validate Apple signing secrets
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_P8_B64: ${{ secrets.APPLE_API_KEY_P8_B64 }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
        run: |
          missing=()
          for key in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_API_KEY APPLE_API_ISSUER APPLE_API_KEY_P8_B64 TAURI_SIGNING_PRIVATE_KEY TAURI_UPDATER_PUBKEY; do
            if [ -z "${!key}" ]; then
              missing+=("$key")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required GitHub Actions secrets for macOS signing/notarization:"
            printf ' - %s\n' "${missing[@]}"
            exit 1
          fi

      - name: Prepare App Store Connect API key file
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8_B64: ${{ secrets.APPLE_API_KEY_P8_B64 }}
        run: |
          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "$APPLE_API_KEY_P8_B64" | openssl base64 -d -A > "$key_path"
          echo "APPLE_API_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Inject updater public key
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = 'src-tauri/tauri.conf.json';
          const json = JSON.parse(fs.readFileSync(path, 'utf8'));
          json.plugins ??= {};
          json.plugins.updater ??= {};
          json.plugins.updater.pubkey = process.env.TAURI_UPDATER_PUBKEY || '';
          fs.writeFileSync(path, `${JSON.stringify(json, null, 2)}\n`, 'utf8');
          NODE

      - name: Build Tauri bundle (signed + notarized)
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Verify macOS app signature
        run: |
          app_path="$(find src-tauri/target/release/bundle/macos -maxdepth 1 -type d -name '*.app' | head -n 1)"
          if [ -z "$app_path" ]; then
            echo "No .app bundle found."
            exit 1
          fi
          echo "Verifying app: $app_path"
          codesign --verify --deep --strict --verbose=2 "$app_path"
          spctl -a -t exec -vv "$app_path"

      - name: Prepare release payload
        env:
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.create-draft-release.outputs.tag }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail

          version="${TAG#v}"
          staging_dir="release-payload/${ARCH}"
          mkdir -p "$staging_dir"

          dmg_file="$(find src-tauri/target/release/bundle -type f -name '*.dmg' | head -n 1)"
          if [ -z "$dmg_file" ]; then
            echo "No dmg bundle found."
            exit 1
          fi
          cp -f "$dmg_file" "$staging_dir/"

          dmg_sig="${dmg_file}.sig"
          if [ -f "$dmg_sig" ]; then
            cp -f "$dmg_sig" "$staging_dir/"
          fi

          updater_archive="$(find src-tauri/target/release/bundle -type f -name '*.app.tar.gz' | head -n 1)"
          if [ -z "$updater_archive" ]; then
            echo "No updater archive (*.app.tar.gz) found."
            exit 1
          fi

          sig_file="${updater_archive}.sig"
          if [ ! -f "$sig_file" ]; then
            echo "No updater signature found: $sig_file"
            exit 1
          fi

          updater_asset_name="skills-box_${version}_${ARCH}.app.tar.gz"
          updater_sig_name="${updater_asset_name}.sig"
          cp -f "$updater_archive" "$staging_dir/$updater_asset_name"
          cp -f "$sig_file" "$staging_dir/$updater_sig_name"

          signature="$(tr -d '\r\n' < "$sig_file")"
          pub_date="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          latest_json_path="$staging_dir/latest.${ARCH}.json"

          cat > "$latest_json_path" <<EOF
          {
            "version": "$version",
            "notes": "skills-box $TAG",
            "pub_date": "$pub_date",
            "platforms": {
              "darwin-$ARCH": {
                "signature": "$signature",
                "url": "https://github.com/$GH_REPO/releases/download/$TAG/$updater_asset_name"
              },
              "darwin-$ARCH-app": {
                "signature": "$signature",
                "url": "https://github.com/$GH_REPO/releases/download/$TAG/$updater_asset_name"
              }
            }
          }
          EOF
          echo "Prepared payload in: $staging_dir"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-payload-${{ matrix.arch }}
          path: release-payload/${{ matrix.arch }}
          if-no-files-found: error

  publish-release:
    name: Publish Release
    needs:
      - create-draft-release
      - build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Download build payloads
        uses: actions/download-artifact@v4
        with:
          path: release-payload
          merge-multiple: true

      - name: Generate combined updater latest.json
        env:
          TAG: ${{ needs.create-draft-release.outputs.tag }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          pub_date="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          json_files="$(find release-payload -type f -name 'latest.*.json' -print)"
          if [ -z "$json_files" ]; then
            echo "No partial updater manifest files found."
            exit 1
          fi

          jq -s \
            --arg version "$version" \
            --arg notes "skills-box $TAG" \
            --arg pub_date "$pub_date" \
            '{version:$version,notes:$notes,pub_date:$pub_date,platforms:(map(.platforms)|add)}' \
            $json_files > release-payload/latest.json

          rm -f release-payload/latest.*.json

      - name: Upload artifacts to draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.create-draft-release.outputs.tag }}
        run: |
          files="$(find release-payload -type f \( -name '*.dmg' -o -name '*.dmg.sig' -o -name '*.app.tar.gz' -o -name '*.app.tar.gz.sig' -o -name 'latest.json' \) -print)"
          if [ -z "$files" ]; then
            echo "No release payload files found."
            exit 1
          fi
          echo "$files" | while IFS= read -r file; do
            [ -z "$file" ] && continue
            echo "Uploading: $file"
            gh release upload "$TAG" "$file" --repo "$GH_REPO" --clobber
          done

      - name: Publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.create-draft-release.outputs.tag }}
        run: |
          if [[ "$TAG" == *-* ]]; then
            gh release edit "$TAG" --repo "$GH_REPO" --draft=false --prerelease
          else
            gh release edit "$TAG" --repo "$GH_REPO" --draft=false --latest
          fi
